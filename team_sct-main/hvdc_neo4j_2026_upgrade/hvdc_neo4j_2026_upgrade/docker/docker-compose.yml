services:
  neo4j:
    image: neo4j:2026.05.0
    container_name: hvdc-neo4j-2026
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: "neo4j/password12345"
      NEO4J_server_memory_heap_initial__size: "1G"
      NEO4J_server_memory_heap_max__size: "2G"
      NEO4J_server_memory_pagecache_size: "1G"
      NEO4J_db_query_default__language: "CYPHER_25"
      NEO4J_server_directories_import: "/import"
      # Optional. Uncomment only if the image/plugin policy is approved in your environment.
      # NEO4J_PLUGINS: '["apoc", "graph-data-science"]'
    volumes:
      - ../neo4j-import/load-csv:/import
      - hvdc_neo4j_data:/data
      - hvdc_neo4j_logs:/logs
volumes:
  hvdc_neo4j_data:
  hvdc_neo4j_logs:
